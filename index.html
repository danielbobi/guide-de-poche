<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Guide de Poche</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .sticky-nav { position: sticky; top: 0; z-index: 50; background: #f8fafc; padding-top: 0.5rem; padding-bottom: 0.5rem; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col pb-20">
  <div class="h-1.5 w-full flex">
    <div class="bg-blue-600 flex-1"></div>
    <div class="bg-white flex-1"></div>
    <div class="bg-red-500 flex-1"></div>
  </div>

  <header class="bg-white border-b border-slate-100 px-4 py-3 shadow-sm flex items-center justify-between sticky top-0 z-40">
    <div class="flex items-center gap-2">
      <div class="bg-blue-600 text-white p-2 rounded-xl"><i data-lucide="compass" class="w-5 h-5"></i></div>
      <div><h1 class="font-bold text-slate-900 text-lg">Guide de Poche</h1></div>
    </div>
    <div class="flex gap-2">
      <button onclick="toggleEmergencyModal(true)" class="p-2 text-red-600 hover:bg-red-50 rounded-lg"><i data-lucide="phone-call" class="w-5 h-5"></i></button>
    </div>
  </header>

  <main class="max-w-md w-full mx-auto p-4 flex-1">
    <div class="sticky-nav">
      <input type="text" id="search-input" oninput="renderDict()" placeholder="Search terms..." class="w-full p-3 bg-white border border-slate-200 rounded-2xl text-sm shadow-sm focus:ring-2 focus:ring-blue-500 outline-none" />
      <div class="flex gap-2 overflow-x-auto no-scrollbar py-2 mt-2">
        <button onclick="filterCategory('all')" id="cat-all" class="cat-pill px-4 py-2 bg-blue-600 text-white rounded-full text-xs font-bold whitespace-nowrap">All</button>
        <button onclick="filterCategory('social')" class="cat-pill px-4 py-2 bg-white text-slate-600 border rounded-full text-xs">Social</button>
        <button onclick="filterCategory('dining')" class="cat-pill px-4 py-2 bg-white text-slate-600 border rounded-full text-xs">Dining</button>
        <button onclick="filterCategory('shopping')" class="cat-pill px-4 py-2 bg-white text-slate-600 border rounded-full text-xs">Shopping</button>
        <button onclick="filterCategory('salon')" class="cat-pill px-4 py-2 bg-white text-slate-600 border rounded-full text-xs">Salon</button>
        <button onclick="filterCategory('driving')" class="cat-pill px-4 py-2 bg-white text-slate-600 border rounded-full text-xs">Driving</button>
        <button onclick="filterCategory('directions')" class="cat-pill px-4 py-2 bg-white text-slate-600 border rounded-full text-xs">Directions</button>
        <button onclick="filterCategory('transit')" class="cat-pill px-4 py-2 bg-white text-slate-600 border rounded-full text-xs">Transit</button>
        <button onclick="filterCategory('emergency')" class="cat-pill px-4 py-2 bg-white text-slate-600 border rounded-full text-xs">Emergency</button>
        <button onclick="filterCategory('culture')" class="cat-pill px-4 py-2 bg-white text-slate-600 border rounded-full text-xs">Culture</button>
      </div>
    </div>
    <div id="dictionary-list" class="flex flex-col gap-3 mt-2"></div>
  </main>

  <div id="emergency-modal" class="fixed inset-0 bg-slate-950/60 flex items-end justify-center z-50 p-4 opacity-0 pointer-events-none transition-all">
    <div class="bg-white rounded-3xl w-full max-w-sm p-6 flex flex-col gap-3">
      <h3 class="font-bold text-red-600 text-lg">Emergency Services</h3>
      <a href="tel:+33112" class="p-3 bg-red-50 rounded-xl text-red-800 font-bold border border-red-100 flex justify-between">112 - European Emergency <span>➔</span></a>
      <a href="tel:+3315" class="p-3 bg-red-50 rounded-xl text-red-800 font-bold border border-red-100 flex justify-between">15 - Medical (SAMU) <span>➔</span></a>
      <a href="tel:+3317" class="p-3 bg-red-50 rounded-xl text-red-800 font-bold border border-red-100 flex justify-between">17 - Police <span>➔</span></a>
      <a href="tel:+3318" class="p-3 bg-red-50 rounded-xl text-red-800 font-bold border border-red-100 flex justify-between">18 - Firefighters <span>➔</span></a>
      <button onclick="toggleEmergencyModal(false)" class="mt-2 p-3 bg-slate-100 rounded-xl font-bold">Close</button>
    </div>
  </div>

  <script>
    let items = [];
    async function loadData() {
      const res = await fetch('data.json');
      items = await res.json();
      renderDict();
    }

    function toggleEmergencyModal(s) {
      const m = document.getElementById('emergency-modal');
      m.style.opacity = s ? '1' : '0';
      m.style.pointerEvents = s ? 'auto' : 'none';
    }

    function renderDict() {
      const q = document.getElementById('search-input').value.toLowerCase();
      const list = document.getElementById('dictionary-list');
      list.innerHTML = '';
      items.filter(i => (activeCat === 'all' || i.category === activeCat) && (i.fr.toLowerCase().includes(q) || i.en.toLowerCase().includes(q))).forEach(i => {
        const d = document.createElement('div');
        d.className = "bg-white p-4 rounded-2xl border flex justify-between items-start";
        d.innerHTML = `<div><p class="font-bold text-sm">${i.fr}</p><p class="text-xs text-slate-500">${i.en}</p></div>
                       <button onclick="speak('${i.fr.replace(/'/g, "\\'")}')" class="p-2 text-blue-600"><i data-lucide="volume-2" class="w-5 h-5"></i></button>`;
        list.appendChild(d);
      });
      lucide.createIcons();
    }

    let activeCat = 'all';
    function filterCategory(c) {
      activeCat = c;
      document.querySelectorAll('.cat-pill').forEach(p => p.classList.replace('bg-blue-600', 'bg-white'));
      document.getElementById('cat-' + c).classList.replace('bg-white', 'bg-blue-600');
      renderDict();
    }

    function speak(t) {
      const u = new SpeechSynthesisUtterance(t);
      u.lang = 'fr-FR';
      window.speechSynthesis.speak(u);
    }

    window.onload = () => { loadData(); lucide.createIcons(); };
  </script>
</body>
</html>

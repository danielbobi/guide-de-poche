<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Guide de Poche - French Travel Companion</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .fade-in { animation: fadeIn 0.25s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .flip-card { background-color: transparent; perspective: 1000px; }
    .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
    .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
    .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; }
    .flip-card-back { transform: rotateY(180deg); }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col pb-20">
  <div class="h-1.5 w-full flex">
    <div class="bg-blue-600 flex-1"></div>
    <div class="bg-white flex-1"></div>
    <div class="bg-red-500 flex-1"></div>
  </div>

  <header class="bg-white border-b border-slate-100 px-4 py-3 sticky top-0 z-40 shadow-sm">
    <div class="max-w-md mx-auto flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="bg-blue-600 text-white p-2 rounded-xl shadow-md">
          <i data-lucide="compass" class="w-5 h-5"></i>
        </div>
        <div>
          <h1 class="text-lg font-bold tracking-tight text-slate-900">Guide de Poche</h1>
          <p class="text-xs text-slate-500 font-medium">Your French Companion</p>
        </div>
      </div>
      <div class="flex items-center gap-1">
        <button onclick="toggleEmergencyModal(true)" class="p-2 text-red-600 hover:bg-red-50 rounded-lg transition-colors mr-1">
          <i data-lucide="phone-call" class="w-5 h-5"></i>
        </button>
        <button onclick="toggleInfoModal(true)" class="p-2 text-slate-500 hover:bg-slate-100 rounded-lg">
          <i data-lucide="smartphone" class="w-5 h-5"></i>
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-md w-full mx-auto p-4 flex-1 flex flex-col gap-4">
    <!-- SEARCH TAB -->
    <div id="tab-search" class="tab-content flex flex-col gap-4">
      <div class="relative">
        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400">
          <i data-lucide="search" class="w-5 h-5"></i>
        </span>
        <input type="text" id="search-input" oninput="handleSearch()" placeholder="Search signs, salon, dining..." class="w-full pl-11 pr-10 py-3 bg-white border border-slate-200 rounded-2xl shadow-sm text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" />
      </div>

      <div class="flex gap-2 overflow-x-auto no-scrollbar py-1 -mx-4 px-4">
        <button onclick="filterCategory('all')" id="cat-all" class="cat-pill px-4 py-2 bg-blue-600 text-white rounded-full text-xs font-semibold whitespace-nowrap">All</button>
        <button onclick="filterCategory('social')" id="cat-social" class="cat-pill px-4 py-2 bg-white text-slate-600 border border-slate-100 rounded-full text-xs font-medium whitespace-nowrap">Social</button>
        <button onclick="filterCategory('dining')" id="cat-dining" class="cat-pill px-4 py-2 bg-white text-slate-600 border border-slate-100 rounded-full text-xs font-medium whitespace-nowrap">Dining</button>
        <button onclick="filterCategory('salon')" id="cat-salon" class="cat-pill px-4 py-2 bg-white text-slate-600 border border-slate-100 rounded-full text-xs font-medium whitespace-nowrap">Salon</button>
        <button onclick="filterCategory('emergency')" id="cat-emergency" class="cat-pill px-4 py-2 bg-white text-slate-600 border border-slate-100 rounded-full text-xs font-medium whitespace-nowrap">Emergency</button>
      </div>

      <div id="dictionary-list" class="flex flex-col gap-3"></div>
    </div>

    <!-- BUILDER TAB -->
    <div id="tab-builder" class="tab-content flex flex-col gap-4 hidden fade-in">
      <div class="bg-slate-900 text-white rounded-3xl p-5 shadow-xl">
        <p id="builder-fr" class="text-lg font-bold text-blue-400">Je voudrais...</p>
        <p id="builder-en" class="text-xs text-slate-400">I would like...</p>
        <div class="flex justify-end gap-2 mt-4 pt-4 border-t border-slate-800">
          <button onclick="copyBuilderText()" class="p-2 bg-slate-800 rounded-lg"><i data-lucide="copy" class="w-4 h-4"></i></button>
          <button onclick="speakBuilderText()" class="p-2 bg-blue-600 rounded-lg"><i data-lucide="volume-2" class="w-4 h-4"></i></button>
        </div>
      </div>
      <div id="builder-starters" class="grid grid-cols-1 gap-2"></div>
      <div id="builder-options-grid" class="grid grid-cols-2 gap-2 mt-4"></div>
    </div>
  </main>

  <!-- EMERGENCY MODAL -->
  <div id="emergency-modal" class="fixed inset-0 bg-slate-950/60 flex items-end justify-center z-50 p-4 transition-all opacity-0 pointer-events-none">
    <div class="bg-white rounded-3xl w-full max-w-sm p-6 flex flex-col gap-4 shadow-2xl transform translate-y-full transition-transform duration-300">
        <h3 class="font-bold text-lg">Emergency Contacts</h3>
        <a href="tel:112" class="p-3 bg-red-100 rounded-2xl text-red-800 font-bold block">112 - European Emergency</a>
        <a href="tel:15" class="p-3 bg-red-100 rounded-2xl text-red-800 font-bold block">15 - Medical Emergency (SAMU)</a>
        <button onclick="toggleEmergencyModal(false)" class="p-3 bg-slate-200 rounded-2xl">Close</button>
    </div>
  </div>

  <nav class="bg-white border-t border-slate-100 fixed bottom-0 left-0 right-0 py-2.5 shadow-lg z-40">
    <div class="max-w-md mx-auto flex justify-around">
      <button onclick="switchTab('search')" id="nav-search" class="nav-btn flex flex-col items-center gap-1 text-blue-600 font-bold">
        <i data-lucide="search" class="w-5 h-5"></i><span class="text-[10px]">Search</span>
      </button>
      <button onclick="switchTab('builder')" id="nav-builder" class="nav-btn flex flex-col items-center gap-1 text-slate-400">
        <i data-lucide="sparkles" class="w-5 h-5"></i><span class="text-[10px]">Builder</span>
      </button>
    </div>
  </nav>

  <script>
    const items = [
      { id: 1, category: 'social', fr: "Bonjour", en: "Hello", ctx: "Essential greeting." },
      { id: 2, category: 'dining', fr: "Une carafe d'eau", en: "Free tap water", ctx: "Request free water." },
      { id: 3, category: 'dining', fr: "L'addition, s'il vous plaît", en: "The bill, please", ctx: "When ready to pay." },
      { id: 4, category: 'salon', fr: "Je voudrais prendre rendez-vous.", en: "I would like to make an appointment.", ctx: "Salon booking." },
      { id: 5, category: 'salon', fr: "Une coupe de cheveux.", en: "A haircut.", ctx: "Requesting a cut." },
      { id: 6, category: 'salon', fr: "Juste les pointes.", en: "Just the ends.", ctx: "For a trim." },
      { id: 7, category: 'salon', fr: "Un shampoing, s'il vous plaît.", en: "A shampoo, please.", ctx: "Requesting wash." },
      { id: 8, category: 'salon', fr: "Pas trop court sur les côtés.", en: "Not too short on the sides.", ctx: "Defining length." }
    ];

    const builderData = {
      starters: {
        je_voudrais: { fr: "Je voudrais", en: "I would like", opts: [
          { fr: "un café noisette", en: "a hazelnut espresso" },
          { fr: "une coupe de cheveux", en: "a haircut" },
          { fr: "un shampoing", en: "a shampoo" }
        ]}
      }
    };

    let activeCat = 'all';

    window.onload = () => { lucide.createIcons(); renderDict(); renderBuilder(); };

    function renderDict() {
      const q = document.getElementById('search-input').value.toLowerCase();
      const list = document.getElementById('dictionary-list');
      list.innerHTML = '';
      items.filter(i => (activeCat === 'all' || i.category === activeCat) && (i.fr.toLowerCase().includes(q) || i.en.toLowerCase().includes(q))).forEach(i => {
        const d = document.createElement('div');
        d.className = "bg-white p-4 rounded-2xl border border-slate-100 flex justify-between items-center";
        d.innerHTML = `<div><p class="font-bold">${i.fr}</p><p class="text-xs text-slate-500">${i.en}</p></div><button onclick="speak('${i.fr.replace(/'/g, "\\'")}')" class="p-2 text-blue-600"><i data-lucide="volume-2"></i></button>`;
        list.appendChild(d);
      });
      lucide.createIcons();
    }

    function renderBuilder() {
      const grid = document.getElementById('builder-starters');
      grid.innerHTML = '';
      Object.keys(builderData.starters).forEach(k => {
        const b = document.createElement('button');
        b.className = "bg-white p-3 rounded-xl border text-left text-sm font-semibold";
        b.innerHTML = `${builderData.starters[k].fr} <span class="text-xs text-slate-400">(${builderData.starters[k].en})</span>`;
        b.onclick = () => {
          const opts = document.getElementById('builder-options-grid');
          opts.innerHTML = '';
          builderData.starters[k].opts.forEach(o => {
            const btn = document.createElement('button');
            btn.className = "bg-white p-2 rounded border text-xs text-left";
            btn.innerText = o.fr;
            btn.onclick = () => {
              document.getElementById('builder-fr').innerText = builderData.starters[k].fr + " " + o.fr;
              document.getElementById('builder-en').innerText = builderData.starters[k].en + " " + o.en;
            };
            opts.appendChild(btn);
          });
        };
        grid.appendChild(b);
      });
    }

    function speak(t) { const u = new SpeechSynthesisUtterance(t); u.lang = 'fr-FR'; speechSynthesis.speak(u); }
    function speakBuilderText() { speak(document.getElementById('builder-fr').innerText); }
    function copyBuilderText() { alert('Copied!'); }
    function filterCategory(c) { activeCat = c; renderDict(); }
    function handleSearch() { renderDict(); }
    function switchTab(t) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
        document.getElementById('tab-' + t).classList.remove('hidden');
    }
    function toggleEmergencyModal(show) { document.getElementById('emergency-modal').style.opacity = show ? "1" : "0"; document.getElementById('emergency-modal').style.pointerEvents = show ? "all" : "none"; }
  </script>
</body>
</html>
